<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Spot a Plug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'display': ['Space Grotesk', 'sans-serif'], 'body': ['Inter', 'sans-serif'] },
                    colors: { 'plug': { 'dark': '#050505', 'wa': '#25D366', 'ig': '#E1306C' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; }
        .mesh-bg { position: fixed; width: 100%; height: 100%; top: 0; left: 0; background: radial-gradient(circle at 50% 0%, rgba(37, 211, 102, 0.08) 0%, transparent 50%); z-index: -1; filter: blur(40px); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">
    <div class="mesh-bg"></div>

    <nav class="p-4 flex items-center gap-2">
        <a href="/" class="flex items-center gap-2 text-zinc-400 hover:text-white transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-display font-bold">Spot a Plug</span>
        </a>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4 pb-20">
        <div class="w-full max-w-md">
            
            <div class="mb-8 text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-plug-ig to-plug-wa flex items-center justify-center">
                    <i data-lucide="lock" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="font-display font-bold text-3xl tracking-tight">Welcome Back</h1>
                <p class="text-zinc-400 text-sm mt-2">Log in to manage your shop and view your stats.</p>
            </div>

            <form action="/login/" method="POST" class="space-y-5 bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6">
                {% csrf_token %}

                <!-- DJANGO ERROR MESSAGE BLOCK -->
                {% if error %}
                    <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm text-center px-4 py-3 rounded-xl flex items-center justify-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i> {{ error }}
                    </div>
                {% endif %}

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">WhatsApp Number (Username)</label>
                    <input type="text" name="username" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="e.g. 2348012345678">
                </div>

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Password</label>
                    <input type="password" name="password" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="Enter your password">
                </div>

                <button type="submit" class="w-full bg-white text-black font-bold py-3.5 rounded-xl hover:bg-zinc-200 transition-all flex items-center justify-center gap-2">
                    Log In
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>

            </form>

            <p class="text-center text-zinc-600 text-xs mt-6">
                Don't have an account? <a href="/register/" class="text-plug-wa hover:underline">List Your Plug</a>
            </p>

        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
