<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Plug - Spot a Plug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'display': ['Space Grotesk', 'sans-serif'], 'body': ['Inter', 'sans-serif'] },
                    colors: { 'plug': { 'dark': '#050505', 'wa': '#25D366', 'ig': '#E1306C' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; }
        .mesh-bg { position: fixed; width: 100%; height: 100%; top: 0; left: 0; background: radial-gradient(circle at 50% 0%, rgba(37, 211, 102, 0.08) 0%, transparent 50%); z-index: -1; filter: blur(40px); }
        input[type="file"]::file-selector-button { background: #262626; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">
    <div class="mesh-bg"></div>

    <nav class="p-4 flex items-center gap-2">
        <a href="/" class="flex items-center gap-2 text-zinc-400 hover:text-white transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-display font-bold">Spot a Plug</span>
        </a>
    </nav>

    <main class="flex-1 flex items-start justify-center p-4 pb-20">
        <div class="w-full max-w-lg">
            
            <div class="mb-8 text-center">
                <h1 class="font-display font-bold text-3xl tracking-tight">List Your Business</h1>
                <p class="text-zinc-400 text-sm mt-2">Get discovered by thousands. Start for free, upgrade later.</p>
            </div>

            <form action="/register/" method="POST" enctype="multipart/form-data" class="space-y-5 bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6">
                {% csrf_token %}

                <!-- DJANGO ERROR MESSAGE BLOCK -->
                {% if error %}
                    <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm text-center px-4 py-3 rounded-xl flex items-center justify-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i> {{ error }}
                    </div>
                {% endif %}

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Business Name *</label>
                        <input type="text" name="shop_name" value="{{ request.POST.shop_name }}" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="e.g. Lagos Thrift Queen">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Category *</label>
                        <select name="category" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition appearance-none">
                            <option value="" disabled selected>Select</option>
                            <option value="Fashion" {% if request.POST.category == 'Fashion' %}selected{% endif %}>Fashion</option>
                            <option value="Food" {% if request.POST.category == 'Food' %}selected{% endif %}>Food</option>
                            <option value="Beauty" {% if request.POST.category == 'Beauty' %}selected{% endif %}>Beauty</option>
                            <option value="Hair & Wigs" {% if request.POST.category == 'Hair & Wigs' %}selected{% endif %}>Hair & Wigs</option>
                            <option value="Real Estate" {% if request.POST.category == 'Real Estate' %}selected{% endif %}>Real Estate</option>
                            <option value="Automobiles" {% if request.POST.category == 'Automobiles' %}selected{% endif %}>Automobiles</option>
                            <option value="Tech" {% if request.POST.category == 'Tech' %}selected{% endif %}>Tech</option>
                            <option value="Home & Decor" {% if request.POST.category == 'Home & Decor' %}selected{% endif %}>Home & Decor</option>
                            <option value="Events & Printing" {% if request.POST.category == 'Events & Printing' %}selected{% endif %}>Events & Printing</option>
                            <option value="Health & Fitness" {% if request.POST.category == 'Health & Fitness' %}selected{% endif %}>Health & Fitness</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Location *</label>
                    <input type="text" name="location" value="{{ request.POST.location }}" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="e.g. Yaba, Lagos">
                </div>

                <!-- CEO FIX: WhatsApp Validation -->
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">WhatsApp Number (with country code) *</label>
                    <input type="text" id="whatsapp_number" name="whatsapp_number" value="{{ request.POST.whatsapp_number }}" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="e.g. 2348012345678">
                    <p id="phone-error" class="text-red-400 text-[10px] mt-1 px-1 h-3"></p>
                </div>

                <!-- CEO FIX: Added Email for Paystack & Verification -->
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Email Address *</label>
                    <input type="email" name="email" value="{{ request.POST.email }}" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="e.g. yourbusiness@email.com">
                    <p class="text-zinc-600 text-[10px] mt-1 px-1">🔒 You'll need to verify this email to access all features.</p>
                </div>

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Instagram Link (Optional)</label>
                    <input type="url" name="instagram_link" value="{{ request.POST.instagram_link }}" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="https://instagram.com/yourplug">
                </div>

                <!-- CEO FIX: PASSWORD FIELDS WITH REAL-TIME VALIDATION -->
                <div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-zinc-400 block mb-1">Password *</label>
                            <input type="password" id="password1" name="password1" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="Min 8 characters">
                            <div class="mt-2 h-1.5 w-full bg-zinc-700 rounded-full overflow-hidden">
                                <div id="password-strength-bar" class="h-full rounded-full bg-red-500 transition-all" style="width: 0%"></div>
                            </div>
                            <p id="password-strength-text" class="text-zinc-500 text-[10px] mt-1 px-1"></p>
                        </div>
                        <div>
                            <label class="text-xs text-zinc-400 block mb-1">Confirm Password *</label>
                            <input type="password" id="password2" name="password2" required class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition" placeholder="Confirm password">
                            <p id="password-match-text" class="text-[10px] mt-1 px-1 h-3"></p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Short Description *</label>
                    <textarea name="description" required rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-plug-wa transition resize-none" placeholder="What do you sell? Why should they buy from you?">{{ request.POST.description }}</textarea>
                </div>

                <!-- MANDATORY PROFILE & COVER PHOTOS -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Profile / Logo Image *</label>
                        <input type="file" name="profile_image" required accept="image/*" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300 focus:outline-none focus:border-plug-wa transition">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Cover / Banner Image *</label>
                        <input type="file" name="cover_image" required accept="image/*" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-zinc-300 focus:outline-none focus:border-plug-wa transition">
                    </div>
                </div>

                <button type="submit" class="w-full bg-plug-wa text-black font-bold py-3.5 rounded-xl hover:bg-green-400 transition-all hover:shadow-[0_0_30px_rgba(37,211,102,0.3)] flex items-center justify-center gap-2">
                    Create My Plug
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>

            </form>

            <p class="text-center text-zinc-600 text-xs mt-6">
                Already have an account? <a href="/login/" class="text-plug-wa hover:underline">Log in</a>
            </p>

        </div>
    </main>

    <!-- CEO FIX: Real-Time Validation Scripts -->
    <script>
        lucide.createIcons();

        // --- REAL-TIME PASSWORD VALIDATION ---
        const p1 = document.getElementById('password1');
        const p2 = document.getElementById('password2');
        const strengthBar = document.getElementById('password-strength-bar');
        const strengthText = document.getElementById('password-strength-text');
        const matchText = document.getElementById('password-match-text');

        function validatePassword() {
            const val = p1.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (val.length >= 12) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            // Update Strength Bar
            const width = (score / 5) * 100;
            strengthBar.style.width = `${width}%`;
            
            if (score <= 1) { strengthBar.className = 'h-full rounded-full bg-red-500 transition-all'; strengthText.textContent = 'Weak'; }
            else if (score <= 3) { strengthBar.className = 'h-full rounded-full bg-yellow-500 transition-all'; strengthText.textContent = 'Fair'; }
            else { strengthBar.className = 'h-full rounded-full bg-plug-wa transition-all'; strengthText.textContent = 'Strong'; }

            if (val.length === 0) { strengthBar.style.width = '0%'; strengthText.textContent = ''; }

            // Check Match
            if (p2.value.length > 0) {
                if (p1.value === p2.value) {
                    matchText.textContent = '✅ Passwords match';
                    matchText.className = 'text-plug-wa text-[10px] mt-1 px-1';
                } else {
                    matchText.textContent = '❌ Passwords do not match';
                    matchText.className = 'text-red-400 text-[10px] mt-1 px-1';
                }
            } else {
                matchText.textContent = '';
            }
        }

        if(p1 && p2) {
            p1.addEventListener('input', validatePassword);
            p2.addEventListener('input', validatePassword);
        }

        // --- REAL-TIME WHATSAPP VALIDATION ---
        const whatsappInput = document.getElementById('whatsapp_number');
        const phoneError = document.getElementById('phone-error');

        whatsappInput.addEventListener('input', function() {
            const val = this.value;
            // Must be digits, can start with +
            const isValid = /^\+?\d{10,15}$/.test(val);
            
            if (val.length > 0 && !isValid) {
                phoneError.textContent = 'Format: 2348012345678 (10-15 digits only)';
            } else {
                phoneError.textContent = '';
            }
        });
    </script>
</body>
</html>
